# LyricDock 配置文件
#
# 这份文件是“长期配置”：
# - 歌词目录
# - 缓存上限
# - 双行开关
# - 颜色、字体、透明度
#
# 程序运行中的窗口位置、大小、锁定状态，
# 仍然会保存在 `窗口状态.json` 里。

# `lyrics_dir`:
#   歌词根目录。程序会在这个目录下自动创建：
#   - 导入歌词/
#   - 缓存歌词/
#   你手动导入的歌词请放进 `导入歌词/`。
#   程序自动抓取的歌词会放进 `缓存歌词/`。
lyrics_dir = "/home/Arch/Downloads/vscode/LyricDock/lyrics-cache"

# `cache_limit_mb`:
#   自动缓存歌词的大小上限，单位是 MB。
#   超出后只会清理 `缓存歌词/` 里的旧歌词，
#   不会删除你手动放进 `导入歌词/` 的文件。
cache_limit_mb = 256

# `show_secondary_line`:
#   是否显示第二行歌词。
#   开启后会显示“当前句 + 下一句”的双行模式。
#   关闭后只显示当前主歌词。
show_secondary_line = true

# `enable_karaoke`:
#   是否启用逐字 / 逐片段 karaoke 效果。
#   开启后，如果存在同名 `.yrc` 文件，就优先使用逐字时间轴。
#   关闭后，即使存在 `.yrc`，也会强制退回普通逐行歌词模式。
enable_karaoke = true

# `use_gradient`:
#   是否使用渐变填充当前高亮歌词。
#   关闭后使用纯色，默认关闭。
use_gradient = false

# `lyric_effect`:
#   歌词效果风格：
#   - "flat": 平面风格，整体全描边（推荐亮色背景）
#   - "floating": 轻微浮动和边缘高亮
lyric_effect = "flat"

# `font_family`:
#   歌词字体族。可以写多个字体，按顺序回退。
font_family = "Noto Sans CJK SC, Source Han Sans SC, Noto Sans, sans-serif"

# `highlight_color`:
#   当前高亮进度颜色（主歌词已播放部分）。
#   不想用白色时，直接改这里。
highlight_color = "#00e676"

# `base_color`:
#   当前主歌词未播放部分颜色。
base_color = "#d0d7e2"

# `preview_color`:
#   另一行“预告句”的颜色。
#   如果你不想让预告句发灰，可以调亮这个颜色。
preview_color = "#f5f7fb"

# `stroke_color`:
#   歌词描边颜色，建议保留深色。
stroke_color = "#000000"

# `stroke_width`:
#   歌词描边粗细，建议范围 1.2 到 6.0。
#   值越大，亮色背景可读性越强；推荐先从 3.2 调到 4.2 试试。
stroke_width = 1

# `lyrics_opacity`:
#   歌词整体透明度，范围 0.0 到 1.0。
#   1.0 表示完全不透明（推荐，最清晰）。
lyrics_opacity = 1.0

# `panel_background_color`:
#   解锁态面板背景色。
#   支持 `#RRGGBB` 和 `#AARRGGBB`。
panel_background_color = "#00000095"

# `panel_border_color`:
#   解锁态面板边框颜色。
panel_border_color = "#ffffffa1"

# `resize_handle_color`:
#   解锁态右下角缩放点颜色。
resize_handle_color = "#ffffffa8"
